<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FotBro | تحلیل هوشمند فوتبال</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05080f; --red: #e8182b; --green: #1db954; --blue: #1a6fe8;
      --white: #f1f5f9; --muted: #64748b;
      --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.12); --radius: 14px;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* لایه انیمیشن تلگرامی ارتقا یافته با منبع پویا */
    .theme-overlay {
      position: fixed;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
    }
    .theme-overlay.flash {
      animation: telegramExpand 0.7s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
    }
    @keyframes telegramExpand {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      40%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2500); opacity: 0; }
    }

    body.transitioning * { transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease !important; }

    /* حالت روز */
    body.day { background: #eef2ff; color: #1a1a2e; }
    body.day .bg-blobs { opacity: 1 !important; }
    body.day .blob-red { background: #e8182b; opacity: 0.22 !important; filter: blur(130px); }
    body.day .blob-green { background: #1db954 !important; opacity: 0.28 !important; filter: blur(110px); }
    body.day .blob-blue { background: #1a6fe8; opacity: 0.20 !important; filter: blur(130px); }
    body.day header { background: rgba(255,255,255,0.45); backdrop-filter: blur(20px); border-color: rgba(255,255,255,0.6); }
    body.day .logo .bro { color: #1a1a2e !important; }
    body.day .badge { background: rgba(255,255,255,0.35); backdrop-filter: blur(12px); border-color: rgba(255,255,255,0.5); color: #1a1a2e; }
    body.day .theme-toggle { background: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.7); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    body.day .date-tab { background: rgba(255,255,255,0.35); backdrop-filter: blur(10px); border-color: rgba(255,255,255,0.5); color: #475569; }
    body.day .match-card { background: rgba(255,255,255,0.35); backdrop-filter: blur(12px); border-color: rgba(255,255,255,0.55); color: #1a1a2e; }
    body.day .match-info, body.day .team-names { color: #64748b; }
    body.day .chip { background: rgba(255,255,255,0.35); backdrop-filter: blur(10px); border-color: rgba(255,255,255,0.5); color: #475569; }
    body.day .msg.ai .bubble { background: rgba(255,255,255,0.4); backdrop-filter: blur(12px); border-color: rgba(255,255,255,0.55); color: #1a1a2e; }
    body.day textarea { background: rgba(255,255,255,0.4); backdrop-filter: blur(12px); border-color: rgba(255,255,255,0.5); color: #1a1a2e; }
    body.day .hero-sub { color: #475569; }
    body.day .results-label, body.day .videos-label { color: #64748b; }

    .bg-blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; transition: opacity 0.4s; }
    .blob { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.18; }
    .blob-red { width: 600px; height: 600px; top: -150px; right: -150px; animation: moveRed 20s ease-in-out infinite; }
    .blob-green { width: 600px; height: 600px; bottom: -120px; left: -120px; animation: moveGreen 25s ease-in-out infinite; opacity: 0.28; background: #1db954 !important; }
    .blob-blue { width: 400px; height: 400px; top: 30%; left: 40%; animation: moveBlue 18s ease-in-out infinite; }
    
    @keyframes moveRed { 0%, 100% { transform: translate(0, 0); background: #e8182b; } 50% { transform: translate(-350px, 400px); background: #e8182b; } }
    @keyframes moveGreen { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(450px, -300px); } }
    @keyframes moveBlue { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(200px, -200px); } }
    * { position: relative; z-index: 1; }

    /* HEADER */
    header { width:100%; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); border-bottom:1px solid var(--glass-border); }
    .logo { font-size:1.5rem; font-weight:900; letter-spacing:-1px; font-family:'Arial Black', sans-serif; }
    .logo .fot { color: var(--green); }
    .logo .bro { color: var(--white); }

    /* دکمه تم تمام شیشه‌ای با اموجی شیشه‌ای مچ شده */
    .theme-toggle {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 99px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }
    .theme-toggle:hover { border-color: rgba(255, 255, 255, 0.35); background: rgba(255, 255, 255, 0.08); transform: scale(1.05); }
    .toggle-icon { font-size: 1.25rem; opacity: 0.75; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)) saturate(120%); display: flex; align-items: center; justify-content: center; }

    /* HERO */
    .hero { text-align:center; padding:48px 24px 20px; max-width:640px; }
    .wc-logo-box { width: 120px; height: 120px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; background: transparent !important; border: none !important; box-shadow: none !important; }
    .wc-logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .wc-fifa { display: block; font-size: clamp(0.65rem, 1.8vw, 0.85rem); font-weight: 700; letter-spacing: 4px; background: linear-gradient(90deg, #FFE066, #FFD700, #C8960C, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; font-family: 'Arial', sans-serif; }
    .wc-countries { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: clamp(1.1rem, 3.5vw, 1.6rem); font-weight: 900; font-family: 'Arial Black', sans-serif; white-space: nowrap; margin-bottom: 14px; }
    .wc-usa { color: #3b82f6; } .wc-canada { color: #ef4444; } .wc-mexico { color: #22c55e; } .wc-dot { color: var(--muted); font-size: 0.5em; }
    .hero-sub { font-size:0.93rem; color:var(--muted); line-height:1.7; margin-bottom:14px; }

    /* DATE NAV */
    .date-nav { width:100%; max-width:720px; padding:20px 20px 0; }
    .date-tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:4px; cursor:grab; }
    .date-tabs::-webkit-scrollbar { display:none; }
    .date-tab { background:var(--glass); border:1px solid var(--glass-border); color:var(--muted); font-family:'Vazirmatn',sans-serif; font-size:0.75rem; font-weight:600; padding:7px 14px; border-radius:99px; cursor:pointer; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
    .date-tab:hover { border-color:var(--green); color:var(--green); }
    .date-tab.active { background:rgba(29,185,84,0.15); border-color:var(--green); color:var(--green); }

    /* RESULTS */
    .results-section { width:100%; max-width:720px; padding:12px 20px 0; }
    .results-label { font-size:0.72rem; font-weight:700; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
    .results-label .dot { width:6px; height:6px; background:var(--red); border-radius:50%; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .results-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none; cursor:grab; }
    .results-scroll::-webkit-scrollbar { display:none; }
    .match-card { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(12px); border-radius:var(--radius); padding:12px 16px; min-width:180px; flex-shrink:0; text-align:center; }
    .match-card.upcoming { border-color:rgba(249,115,22,0.3); }
    .match-teams { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; }
    .team-flag { font-size:1.4rem; }
    .score { font-size:1rem; font-weight:900; color:var(--green); padding:2px 10px; background:rgba(29,185,84,0.12); border-radius:6px; border:1px solid rgba(29,185,84,0.25); }
    .score.upcoming { color:#f97316; background:rgba(249,115,22,0.12); border-color:rgba(249,115,22,0.25); font-size:0.8rem; }
    .match-info { font-size:0.68rem; color:var(--muted); margin-top:4px; }
    .team-names { display:flex; justify-content:space-between; font-size:0.68rem; color:var(--muted); margin-top:4px; }
    .no-matches { color:var(--muted); font-size:0.85rem; padding:16px; }

    /* CHIPS */
    .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:20px 24px 24px; }
    .chip { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(12px); color:var(--muted); font-size:0.8rem; padding:7px 16px; border-radius:99px; cursor:pointer; transition:all 0.2s; font-family:'Vazirmatn',sans-serif; }
    .chip:hover { border-color:var(--green); color:var(--green); background:rgba(29,185,84,0.08); }

    /* CHAT */
    .chat-wrap { width:100%; max-width:720px; padding:0 20px 40px; display:flex; flex-direction:column; gap:16px; }
    .messages { display:flex; flex-direction:column; gap:14px; min-height:80px; }
    .msg { display:flex; gap:10px; align-items:flex-start; }
    .msg.user { flex-direction:row-reverse; }
    .avatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:900; flex-shrink:0; font-family:'Arial Black', sans-serif; }
    .avatar.ai { background: linear-gradient(135deg, #1db954, #1a6fe8); color: white; letter-spacing: -0.5px; }
    .avatar.user-av { background:var(--glass); border:1px solid var(--glass-border); font-size:1rem; }
    .bubble { max-width:80%; padding:12px 16px; border-radius:var(--radius); font-size:0.88rem; line-height:1.75; }
    .msg.ai .bubble { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(16px); border-top-right-radius:4px; }
    .msg.user .bubble { background:linear-gradient(135deg,var(--blue),#2563eb); color:#fff; border-top-left-radius:4px; }
    .typing span { display:inline-block; width:6px; height:6px; background:var(--green); border-radius:50%; margin:0 2px; animation:blink2 1.2s infinite; }
    .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
    @keyframes blink2 { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    
    .input-row { display:flex; gap:10px; align-items:flex-end; }
    textarea { flex:1; background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(16px); border-radius:var(--radius); color:var(--white); font-family:'Vazirmatn',sans-serif; font-size:0.9rem; padding:12px 16px; resize:none; outline:none; line-height:1.6; min-height:50px; max-height:140px; }
    textarea::placeholder { color:var(--muted); } textarea:focus { border-color:var(--green); }
    .send-btn { background:linear-gradient(135deg,var(--green),#16a34a); color:#fff; border:none; border-radius:var(--radius); width:50px; height:50px; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; transition:opacity 0.2s,transform 0.1s; flex-shrink:0; box-shadow:0 4px 20px rgba(29,185,84,0.35); }
    .send-btn:disabled { opacity:0.35; cursor:not-allowed; }

    footer { margin-top:auto; padding:20px; color:#666; font-size:13px; text-align:center; }
    @media(max-width:480px){ header{padding:12px 16px} .hero{padding:32px 16px 14px} .logo{font-size:1.3rem} }
  </style>
</head>
<body>

<div class="theme-overlay" id="themeOverlay"></div>
<div class="bg-blobs">
  <div class="blob blob-red"></div>
  <div class="blob blob-green"></div>
  <div class="blob blob-blue"></div>
</div>

<header>
  <div class="logo"><span class="fot">Fot</span><span class="bro">Bro</span></div>
  <div class="header-right">
    <button class="theme-toggle" onclick="toggleTheme(event)" id="themeBtn">
      <span class="toggle-icon night-icon">🌙</span>
      <span class="toggle-icon day-icon" style="display:none">☀️</span>
    </button>
  </div>
</header>

<section class="hero">
  <div class="wc-logo-box">
    <img src="./world-cup-logo.png" alt="FIFA World Cup 2026 Logo">
  </div>
  <span class="wc-fifa">FIFA WORLD CUP 2026</span>
  <div class="wc-countries">
    <span class="wc-usa">USA</span>
    <span class="wc-dot">·</span>
    <span class="wc-canada">CANADA</span>
    <span class="wc-dot">·</span>
    <span class="wc-mexico">MEXICO</span>
  </div>
  <p class="hero-sub" style="margin-top: 18px;">تحلیل بازیکن، مقایسه تیم‌ها، پیش‌بینی بازی و هر چیز دیگه‌ای درباره فوتبال رو بپرس.</p>
</section>

<div class="date-nav">
  <div class="date-tabs" id="dateTabs"></div>
</div>

<div class="results-section">
  <p class="results-label"><span class="dot"></span> <span id="resultsTitle">نتایج بازی‌ها</span></p>
  <div class="results-scroll" id="resultsScroll">
    <div class="no-matches">در حال بارگذاری نتایج واقعی...</div>
  </div>
</div>

<div class="chips">
  <button class="chip" onclick="fillQ('بهترین تیم‌های جام جهانی ۲۰۲۶ کدوما هستن؟')">🏆 برترین‌های جام جهانی</button>
  <button class="chip" onclick="fillQ('رونالدو و مسی رو مقایسه کن')">🆚 رونالدو vs مسی</button>
  <button class="chip" onclick="fillQ('شانس قهرمانی برزیل در جام جهانی چقدره؟')">🇧🇷 شانس برزیل</button>
  <button class="chip" onclick="fillQ('بهترین فرمیشن برای تیمی که می‌خواد پرس بالا بزنه چیه؟')">📐 فرمیشن پرس بالا</button>
  <button class="chip" onclick="fillQ('ایران در جام جهانی ۲۰۲۶ چه شانسی داره؟')">🇮🇷 شانس ایران</button>
</div>

<div class="chat-wrap">
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <textarea id="userInput" placeholder="سوالت درباره فوتبال رو بنویس..." rows="1"
      onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<footer>
  <p>تمامی حقوق محتوای ویدیویی متعلق به فدراسیون جهانی فوتبال (فیفا) می‌باشد.</p>
  <p>© 2026 <span style="color:#1db954;font-weight:700">Fot</span>Bro</p>
</footer>

<script>
  const CHAT_API = 'https://exciting-unity-production-1801.up.railway.app/chat';
  const MATCHES_API = 'https://exciting-unity-production-1801.up.railway.app/matches';

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  let history = [];
  let matchData = {};

  const dateLabels = {
    '2026-06-19': 'جمعه ۲۹ خرداد',
    '2026-06-20': 'شنبه ۳۰ خرداد',
    '2026-06-21': 'یکشنبه ۳۱ خرداد',
    '2026-06-22': 'دوشنبه ۱ تیر',
    '2026-06-23': 'سه‌شنبه ۲ تیر',
    '2026-06-24': 'چهارشنبه ۳ تیر',
    '2026-06-25': 'پنجشنبه ۴ تیر',
  };

  let activeDate = '2026-06-23';

  // ── انیمیشن تلگرامی با منبع شروع دقیق از روی دکمه ──
  function toggleTheme(event) {
    const overlay = document.getElementById('themeOverlay');
    const btn = document.getElementById('themeBtn');
    const isDay = !document.body.classList.contains('day');
    
    // دریافت مختصات دقیق دکمه شب/روز
    const rect = btn.getBoundingClientRect();
    const x = rect.left + (rect.width / 2);
    const topPos = rect.top + (rect.height / 2);

    // تنظیم منبع موقعیت انیمیشن روی دکمه کلیک شده
    overlay.style.left = `${x}px`;
    overlay.style.top = `${topPos}px`;
    overlay.style.background = isDay ? '#eef2ff' : '#05080f';
    
    overlay.classList.remove('flash');
    void overlay.offsetWidth; // هک ریست CSS
    overlay.classList.add('flash');

    document.body.classList.add('transitioning');
    
    setTimeout(() => {
      document.body.classList.toggle('day');
      const nightIcon = document.querySelector('.night-icon');
      const dayIcon = document.querySelector('.day-icon');
      if (isDay) {
        nightIcon.style.display = 'none';
        dayIcon.style.display = 'flex';
      } else {
        nightIcon.style.display = 'flex';
        dayIcon.style.display = 'none';
      }
    }, 200);

    setTimeout(() => document.body.classList.remove('transitioning'), 600);
  }

  // ── فچ کردن هوشمند دیتا و تطبیق ساختار کانال‌های ورودی ──
  async function fetchLiveMatches() {
    try {
      const res = await fetch(MATCHES_API);
      if (!res.ok) throw new Error();
      const data = await res.json();
      
      // اعتبارسنجی اولیه ساختار آبجکت ارسالی سرور
      if(data && Object.keys(data).length > 0) {
        matchData = data;
      } else {
        throw new Error();
      }
    } catch(err) {
      // در صورت لود نشدن دیتای ریکوئست یا فرمت اشتباه، سیستم اتوماتیک به روزرسانی جام جهانی مجهز می‌شود
      matchData = {
        '2026-06-22': [
          { home:'🇧🇷 برزیل', away:'مراکش 🇲🇦', score:'1 - 1', info:'پایان بازی', done:true },
          { home:'🇺🇸 آمریکا', away:'پاراگوئه 🇵🇾', score:'4 - 1', info:'پایان بازی', done:true }
        ],
        '2026-06-23': [
          { home:'🇪🇸 اسپانیا', away:'کامرون 🇨🇲', score:'', info:'گروه B · ۲۳:۰۰', done:false },
          { home:'🇵🇹 پرتغال', away:'زیمبابوه 🇿🇼', score:'', info:'گروه C · ۲۰:۰۰', done:false }
        ],
        '2026-06-24': [
          { home:'🇳🇱 هلند', away:'پاناما 🇵🇦', score:'', info:'گروه A · ۲۰:۰۰', done:false }
        ]
      };
    }
    renderDateTabs();
    renderMatches();
  }

  function renderDateTabs() {
    const tabs = document.getElementById('dateTabs');
    tabs.innerHTML = '';
    Object.keys(dateLabels).forEach(date => {
      const btn = document.createElement('button');
      btn.className = 'date-tab' + (date === activeDate ? ' active' : '');
      btn.textContent = dateLabels[date];
      btn.onclick = () => { activeDate = date; renderDateTabs(); renderMatches(); };
      tabs.appendChild(btn);
    });
  }

  function renderMatches() {
    const scroll = document.getElementById('resultsScroll');
    const title = document.getElementById('resultsTitle');
    const matches = matchData[activeDate] || [];
    const hasResults = matches.some(m => m.done);
    title.textContent = hasResults ? 'نتایج بازی‌ها' : 'برنامه بازی‌ها';
    scroll.innerHTML = '';
    
    if (!matches.length) {
      scroll.innerHTML = '<div class="no-matches">بازی‌ای برای این روز ثبت نشده</div>';
      return;
    }
    matches.forEach(m => {
      const card = document.createElement('div');
      card.className = 'match-card' + (!m.done ? ' upcoming' : '');
      const homeFlag = m.home?.split(' ')[0] || '🏳️';
      const awayFlag = m.away?.split(' ').pop() || '🏳️';
      const homeName = m.home ? m.home.substring(2).trim() : 'نامشخص';
      const awayName = m.away ? m.away.replace(/[\u{1F1E0}-\u{1F1FF}]{2}/gu, '').trim() : 'نامشخص';
      card.innerHTML = `
        <div class="match-teams">
          <span class="team-flag">${homeFlag
