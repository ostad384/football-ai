<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فوتبال‌یار | تحلیل هوشمند فوتبال</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pitch: #0d3b1e;
      --pitch-mid: #145228;
      --lime: #b5f53c;
      --lime-dim: #8ec42a;
      --white: #f4f9f0;
      --muted: #7a9e84;
      --card: #0a2e17;
      --border: #1e5a30;
      --radius: 12px;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: var(--pitch);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .logo-dot { color: var(--lime); }

    .badge {
      background: var(--lime);
      color: var(--pitch);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 1px;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
      max-width: 640px;
    }

    .hero-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--lime);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .hero h1 span { color: var(--lime); }

    .hero p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── QUICK CHIPS ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 0 24px 32px;
    }

    .chip {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 6px 14px;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Vazirmatn', sans-serif;
    }
    .chip:hover {
      border-color: var(--lime);
      color: var(--lime);
    }

    /* ── CHAT BOX ── */
    .chat-wrap {
      width: 100%;
      max-width: 720px;
      padding: 0 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 80px;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .avatar.ai { background: var(--lime); color: var(--pitch); }
    .avatar.user-av { background: var(--border); color: var(--white); }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .msg.ai .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }
    .msg.user .bubble {
      background: var(--lime);
      color: var(--pitch);
      font-weight: 500;
      border-top-left-radius: 4px;
    }

    /* typing dots */
    .typing span {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--lime);
      border-radius: 50%;
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* ── INPUT ROW ── */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--white);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 0.9rem;
      padding: 12px 16px;
      resize: none;
      outline: none;
      line-height: 1.6;
      min-height: 50px;
      max-height: 140px;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--lime); }

    .send-btn {
      background: var(--lime);
      color: var(--pitch);
      border: none;
      border-radius: var(--radius);
      width: 50px;
      height: 50px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--lime-dim); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding: 16px;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 480px) {
      header { padding: 16px 20px; }
      .hero { padding: 40px 20px 28px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⚽ فوتبال<span class="logo-dot">یار</span></div>
  <span class="badge">هوش مصنوعی</span>
</header>

<section class="hero">
  <span class="hero-tag">تحلیل هوشمند فوتبال</span>
  <h1>هر سوال فوتبالی داری،<br/><span>اینجا جواب داره</span></h1>
  <p>تحلیل بازیکن، مقایسه تیم‌ها، پیش‌بینی بازی و هر چیز دیگه‌ای درباره فوتبال رو بپرس.</p>
</section>

<div class="chips">
  <button class="chip" onclick="fillQ('بهترین مهاجم لیگ برتر ایران در فصل جاری کیه؟')">⚡ برترین مهاجم لیگ برتر</button>
  <button class="chip" onclick="fillQ('رونالدو و مسی رو مقایسه کن')">🆚 رونالدو vs مسی</button>
  <button class="chip" onclick="fillQ('شانس قهرمانی استقلال در فصل جاری چقدره؟')">🏆 شانس قهرمانی استقلال</button>
  <button class="chip" onclick="fillQ('بهترین فرمیشن برای تیمی که می‌خواد پرس بالا بزنه چیه؟')">📐 فرمیشن پرس بالا</button>
  <button class="chip" onclick="fillQ('چرا بارسلونا در دهه اخیر ضعیف‌تر شده؟')">📉 افت بارسلونا</button>
</div>

<div class="chat-wrap">
  <div class="messages" id="messages"></div>

  <div class="input-row">
    <textarea id="userInput" placeholder="سوالت درباره فوتبال رو بنویس..." rows="1"
      onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="ارسال">
      ➤
    </button>
  </div>
</div>

<footer>ساخته‌شده با Claude AI · فوتبال‌یار ۲۰۲۵</footer>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  let history = [];

  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function fillQ(text) {
    inputEl.value = text;
    autoGrow(inputEl);
    inputEl.focus();
  }

  function addMsg(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role === 'user' ? 'user' : 'ai'}`;

    const av = document.createElement('div');
    av.className = `avatar ${role === 'user' ? 'user-av' : 'ai'}`;
    av.textContent = role === 'user' ? '👤' : '⚽';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br/>');

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typing-indicator';

    const av = document.createElement('div');
    av.className = 'avatar ai';
    av.textContent = '⚽';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    addMsg('user', text);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'x-api-key': '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',
          'anthropic-version':'2023-06-01'
                 },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: `تو یه تحلیلگر فوتبال حرفه‌ای هستی به اسم «فوتبال‌یار». 
فارسی صحبت می‌کنی و جواب‌هات کوتاه، دقیق و جذابه.
فقط درباره فوتبال صحبت می‌کنی. اگه سوال غیر فوتبالی پرسیدن، مودبانه بگو که فقط فوتبال بلدی.
از اطلاعات فوتبالی‌ات برای تحلیل واقعی استفاده کن. جواب‌ها رو با ایموجی جذاب کن.`,
          messages: history
        })
      });

      const data = await res.json();
      removeTyping();

      const reply = data?.content?.[0]?.text || 'مشکلی پیش اومد، دوباره امتحان کن.';
      addMsg('ai', reply);
      history.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeTyping();
      addMsg('ai', '❌ خطا در اتصال. لطفاً دوباره امتحان کن.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  // Welcome message
  window.onload = () => {
    addMsg('ai', 'سلام! من فوتبال‌یارم ⚽\nهر سوالی درباره فوتبال داری بپرس — تحلیل بازیکن، مقایسه تیم‌ها، تاکتیک، لیگ‌ها و هر چیز دیگه‌ای.');
  };
</script>
</body>
</html>
